server:
  port: 8080

spring:
  application:
    name: camunda-demo

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

zeebe:
  client:
    broker:
      gateway-address: localhost:26500
    security:
      plaintext: true

app:
  docs:
    title: Camunda Demo API
    description: REST API for starting Camunda process instances, correlating messages and managing active jobs.
    version: 1.0.0
  camunda:
    job-index: zeebe-record_job_8.4.17_2026-04-01
    zeebe:
      process-id: demo-process
  elastic:
    url: http://localhost:9200
