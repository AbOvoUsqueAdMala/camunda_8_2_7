name: camunda_8_2_7

x-elasticsearch-url: &elasticsearch_url http://elasticsearch:9200
x-zeebe-gateway: &zeebe_gateway zeebe:26500
x-csharp-service-url: &csharp_service_url http://csharp-service:8080
x-restart-policy: &restart_policy unless-stopped
x-spring-profile: &spring_profile dev

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.5.3}
    container_name: elasticsearch
    restart: *restart_policy
    environment:
      discovery.type: single-node
      cluster.name: camunda-cluster
      xpack.security.enabled: "false"
      action.destructive_requires_name: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20

  zeebe:
    image: camunda/zeebe:${CAMUNDA_VERSION:-8.4.17}
    container_name: zeebe
    restart: *restart_policy
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ZEEBE_BROKER_CLUSTER_PARTITIONSCOUNT: "1"
      ZEEBE_BROKER_CLUSTER_REPLICATIONFACTOR: "1"
      ZEEBE_BROKER_CLUSTER_CLUSTERSIZE: "1"
      ZEEBE_BROKER_GATEWAY_ENABLE: "true"
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME: io.camunda.zeebe.exporter.ElasticsearchExporter
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL: *elasticsearch_url
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE: "1"
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_INDEX_PREFIX: zeebe-record
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_CREATE_TEMPLATE: "true"
    ports:
      - "26500:26500"
      - "9600:9600"
    volumes:
      - zeebe_data:/usr/local/zeebe/data
      - zeebe_logs:/usr/local/zeebe/logs

  operate:
    image: camunda/operate:${CAMUNDA_VERSION:-8.4.17}
    container_name: operate
    restart: *restart_policy
    depends_on:
      elasticsearch:
        condition: service_healthy
      zeebe:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: *spring_profile
      CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS: *zeebe_gateway
      CAMUNDA_OPERATE_ELASTICSEARCH_URL: *elasticsearch_url
      CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL: *elasticsearch_url
    ports:
      - "8081:8080"

  tasklist:
    image: camunda/tasklist:${CAMUNDA_VERSION:-8.4.17}
    container_name: tasklist
    restart: *restart_policy
    depends_on:
      elasticsearch:
        condition: service_healthy
      zeebe:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: *spring_profile
      CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS: *zeebe_gateway
      CAMUNDA_TASKLIST_ELASTICSEARCH_URL: *elasticsearch_url
      CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL: *elasticsearch_url
    ports:
      - "8082:8080"

  connectors:
    image: camunda/connectors-bundle:${CONNECTORS_VERSION:-0.16.1}
    container_name: connectors
    restart: *restart_policy
    depends_on:
      zeebe:
        condition: service_started
    environment:
      ZEEBE_CLIENT_BROKER_GATEWAY-ADDRESS: *zeebe_gateway
      ZEEBE_CLIENT_SECURITY_PLAINTEXT: "true"
    ports:
      - "8085:8080"

  csharp-service:
    profiles:
      - app
    build:
      context: ./stub-service
    container_name: csharp-service
    restart: *restart_policy
    ports:
      - "8089:8080"

  app:
    profiles:
      - app
    build:
      context: .
    container_name: camunda82-demo-app
    restart: *restart_policy
    depends_on:
      elasticsearch:
        condition: service_healthy
      zeebe:
        condition: service_started
      csharp-service:
        condition: service_started
    environment:
      APP_ELASTIC_URL: *elasticsearch_url
      APP_STUB_SERVICE_BASE_URL: *csharp_service_url
      APP_STUB_SERVICE_SUBMIT_PATH: /api/stub/external-service
      APP_STUB_SERVICE_ASYNC_SUBMIT_PATH: /api/stub/external-service/async
      APP_CAMUNDA_JOB_INDEX: "zeebe-record_job_${CAMUNDA_VERSION:-8.4.17}_*"
      ZEEBE_CLIENT_BROKER_GATEWAYADDRESS: *zeebe_gateway
      ZEEBE_CLIENT_SECURITY_PLAINTEXT: "true"
    ports:
      - "8080:8080"

volumes:
  elasticsearch_data:
  zeebe_data:
  zeebe_logs:
